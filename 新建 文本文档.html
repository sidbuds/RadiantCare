<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熙心健康体检平台 - 管理端</title>
    <style>
        :root {
            --primary-color: #00B96B; /* 健康青 */
            --bg-color: #F5F7FA;
            --sidebar-bg: #001529;
            --text-main: #333333;
            --text-muted: #8C8C8C;
            --danger-color: #F5222D;
            --white: #FFFFFF;
            --border-color: #E4E7ED;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { display: flex; height: 100vh; background-color: var(--bg-color); color: var(--text-main); }
        
        /* 侧边栏 */
        .sidebar { width: 240px; background-color: var(--sidebar-bg); color: rgba(255, 255, 255, 0.65); display: flex; flex-direction: column; }
        .logo { height: 60px; line-height: 60px; text-align: center; font-size: 18px; font-weight: bold; color: var(--white); border-bottom: 1px solid #002140; letter-spacing: 1px; }
        .menu-item { padding: 16px 24px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .menu-item:hover { color: var(--white); }
        .menu-item.active { background-color: var(--primary-color); color: var(--white); }
        
        /* 顶部导航 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { height: 60px; background-color: var(--white); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 1px 4px rgba(0,21,41,0.08); z-index: 10; }
        .user-info { display: flex; align-items: center; gap: 12px; font-size: 14px; }
        .avatar { width: 32px; height: 32px; background-color: var(--primary-color); border-radius: 50%; color: var(--white); display: flex; align-items: center; justify-content: center; }

        /* 内容区 */
        .content-body { padding: 24px; overflow-y: auto; flex: 1; }
        .page-title { font-size: 20px; font-weight: 500; margin-bottom: 24px; }
        
        /* 数据卡片 */
        .data-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .card { background: var(--white); padding: 20px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .card-title { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: bold; }
        .text-danger { color: var(--danger-color); }

        /* 面板区域 */
        .panel { background: var(--white); padding: 20px; border-radius: 4px; border: 1px solid var(--border-color); margin-bottom: 24px; }
        .panel-header { font-size: 16px; font-weight: 500; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        
        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #FAFAFA; color: var(--text-muted); font-weight: 500; }
        tr:hover { background-color: #F5F7FA; }
        .btn { padding: 6px 12px; background-color: var(--primary-color); color: var(--white); border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">熙心管理后台</div>
        <div class="menu-item">体检任务生成</div>
        <div class="menu-item">报告发布管理</div>
        <div class="menu-item">咨询分配管理</div>
        <div class="menu-item active">医生分析总览</div>
        <div class="menu-item">医生工作量排行</div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">首页 / 医生分析总览</div>
            <div class="user-info">
                <div class="avatar">Admin</div>
                <span>超级管理员</span>
            </div>
        </div>

        <div class="content-body">
            <h1 class="page-title">医生分析总览</h1>

            <div class="data-cards">
                <div class="card">
                    <div class="card-title">今日异常总数</div>
                    <div class="card-value text-danger">342</div>
                </div>
                <div class="card">
                    <div class="card-title">整体异常率</div>
                    <div class="card-value">28.5%</div>
                </div>
                <div class="card">
                    <div class="card-title">高风险用户数</div>
                    <div class="card-value text-danger">15</div>
                </div>
                <div class="card">
                    <div class="card-title">今日已处理咨询</div>
                    <div class="card-value">128</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">高风险用户清单及责任医生跟进</div>
                <table>
                    <thead>
                        <tr>
                            <th>用户姓名</th>
                            <th>体检任务号</th>
                            <th>高风险项</th>
                            <th>预警级别</th>
                            <th>关联科室</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>张三丰</td>
                            <td>T20260618001</td>
                            <td>空腹血糖 15.2 mmol/L</td>
                            <td><span style="color: var(--danger-color);">红色预警</span></td>
                            <td>内分泌科</td>
                            <td><button class="btn">查看详情</button></td>
                        </tr>
                        <tr>
                            <td>李四</td>
                            <td>T20260618005</td>
                            <td>肺部CT毛玻璃结节(8mm)</td>
                            <td><span style="color: var(--danger-color);">红色预警</span></td>
                            <td>放射科</td>
                            <td><button class="btn">查看详情</button></td>
                        </tr>
                        <tr>
                            <td>王五</td>
                            <td>T20260618012</td>
                            <td>血压 180/110 mmHg</td>
                            <td><span style="color: #FAAD14;">橙色预警</span></td>
                            <td>内科</td>
                            <td><button class="btn">查看详情</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

</body>
</html>
