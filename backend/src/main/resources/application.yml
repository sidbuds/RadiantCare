server:
  port: ${SERVER_PORT:18080}

spring:
  application:
    name: xixin-health-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    timeout: ${REDIS_TIMEOUT:5s}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3307/xixin_health?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:gwtzn7k8}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.stdout.StdOutImpl}
  global-config:
    db-config:
      id-type: auto

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

app:
  security:
    jwt-secret: ${JWT_SECRET:xixin-health-demo-secret}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
  cache:
    package-ttl-seconds: ${PACKAGE_CACHE_TTL_SECONDS:300}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

xixin:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:xixinadmin}
    secret-key: ${MINIO_SECRET_KEY:xixinadmin123}
    bucket: ${MINIO_BUCKET:report-pdfs}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
