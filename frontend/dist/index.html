<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111113" />
    <title>熙心健康体检 - 全链路体检与报告服务平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <style>
      html { background: #111113; }
      body { margin: 0; background: #111113; }

      .app-loader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #111113;
        transition: opacity 0.4s ease;
      }
      .app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loader-mark {
        width: 44px;
        height: 44px;
        border-radius: 11px;
        background: #6a9a92;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader-mark svg {
        width: 22px;
        height: 22px;
        stroke: #111113;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .loader-text {
        margin-top: 18px;
        font-family: "Outfit", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(216, 212, 204, 0.25);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-RmM4qLDh.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D7qRIsMC.css">
  </head>
  <body>
    <div id="app">
      <div class="app-loader" id="app-loader">
        <div class="loader-mark">
          <svg viewBox="0 0 24 24">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
          </svg>
        </div>
        <div class="loader-text">熙心健康</div>
      </div>
    </div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(() => loader.remove(), 400);
          }
        }, 200);
      });
    </script>
  </body>
</html>
